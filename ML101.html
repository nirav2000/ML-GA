<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>RL Gridworld</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1200px;
      margin: 20px auto;
      line-height: 1.4;
      padding: 0 12px;
    }
    .layout {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      flex-wrap: wrap;
    }
    .left {
      flex: 0 0 520px;
    }
    .right {
      flex: 1;
      min-width: 320px;
    }
    canvas { border: 1px solid #333; display: block; margin-bottom: 12px; }
    button { margin-right: 8px; margin-bottom: 8px; }
    .controls { margin-bottom: 8px; }
    .hint { color: #444; font-size: 0.95rem; margin: 0 0 8px; }
    .status { color: #222; font-size: 0.95rem; margin: 0 0 8px; }
    #explanation {
      padding: 12px;
      border: 1px solid #d8d8d8;
      background: #fafafa;
      border-radius: 8px;
    }
    .footer {
      margin-top: 18px;
      padding-top: 10px;
      border-top: 1px solid #ddd;
      color: #444;
      font-size: 0.92rem;
    }
    .version-link {
      cursor: pointer;
      color: #0a58ca;
      text-decoration: underline;
      font-weight: 600;
      background: none;
      border: 0;
      padding: 0;
    }
    #changelogPanel {
      margin-top: 8px;
      padding: 10px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      white-space: pre-wrap;
      display: none;
      max-height: 240px;
      overflow: auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    #lastUpdate {
      margin-top: 10px;
      padding: 8px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <h2>Q-Learning Gridworld</h2>

  <div class="layout">
    <div class="left">
      <canvas id="game" width="500" height="500"></canvas>
      <div class="controls">
        <button id="train100">Train 100 Episodes</button>
        <button id="train1000">Train 1000 Episodes</button>
        <button id="stepMove">Step Training Move</button>
        <button id="runGreedy">Run Learned Policy</button>
        <button id="reset">Reset Q-Table</button>
        <button id="stop" disabled>Stop</button>
        <label>
          <input id="showLearning" type="checkbox" />
          Show learning while training
        </label>
        <label>
          Speed
          <input id="visualSpeed" type="range" min="120" max="2000" value="650" step="40" />
          <span id="speedLabel">650ms</span>
        </label>
      </div>
      <p class="hint">Tip: use <strong>Step Training Move</strong> for one update at a time, or enable live mode to watch full episodes.</p>
      <p id="status" class="status">Idle.</p>
      <p id="stats"></p>
    </div>

    <aside class="right" id="explanation"></aside>
  </div>

  <footer class="footer">
    Version: <button id="versionLink" class="version-link" type="button">v1.2.0</button>
    <div id="changelogPanel" aria-live="polite">Click the version to load update history.</div>
  </footer>

  <script type="module">
    import { renderLearningSummary, renderMathWalkthrough, renderTrainingFlowFAQ, renderLastUpdatePanel, updateLastUpdatePanel } from "./ml101-explainer.js";

    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const statsEl = document.getElementById("stats");
    const statusEl = document.getElementById("status");
    const showLearningEl = document.getElementById("showLearning");
    const visualSpeedEl = document.getElementById("visualSpeed");
    const speedLabelEl = document.getElementById("speedLabel");
    const train100Btn = document.getElementById("train100");
    const train1000Btn = document.getElementById("train1000");
    const stepMoveBtn = document.getElementById("stepMove");
    const runGreedyBtn = document.getElementById("runGreedy");
    const resetBtn = document.getElementById("reset");
    const stopBtn = document.getElementById("stop");
    const versionLinkEl = document.getElementById("versionLink");
    const changelogPanelEl = document.getElementById("changelogPanel");

    const GRID_SIZE = 5;
    const CELL = canvas.width / GRID_SIZE;

    const ACTIONS = ["up", "down", "left", "right"];
    const START = { x: 0, y: 0 };
    const GOAL = { x: 4, y: 4 };
    const TRAPS = [{ x: 3, y: 1 }, { x: 1, y: 3 }];

    const APP_VERSION = "v1.2.0";

    const alpha = 0.1;
    const gamma = 0.95;
    let epsilon = 0.3;
    const epsilonDecay = 0.995;
    const minEpsilon = 0.05;

    let episode = 0;
    let rewardsHistory = [];
    let busy = false;
    let cancelRequested = false;

    let stepSession = {
      active: false,
      state: null,
      totalReward: 0,
      steps: 0
    };

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function stateKey(x, y) {
      return `${x},${y}`;
    }

    function createQTable() {
      const q = {};
      for (let y = 0; y < GRID_SIZE; y++) {
        for (let x = 0; x < GRID_SIZE; x++) {
          q[stateKey(x, y)] = { up: 0, down: 0, left: 0, right: 0 };
        }
      }
      return q;
    }

    let Q = createQTable();

    function isTrap(x, y) {
      return TRAPS.some(t => t.x === x && t.y === y);
    }

    function isGoal(x, y) {
      return x === GOAL.x && y === GOAL.y;
    }

    function resetEnv() {
      return { x: START.x, y: START.y };
    }

    function step(state, action) {
      let { x, y } = state;

      if (action === "up") y--;
      if (action === "down") y++;
      if (action === "left") x--;
      if (action === "right") x++;

      x = Math.max(0, Math.min(GRID_SIZE - 1, x));
      y = Math.max(0, Math.min(GRID_SIZE - 1, y));

      let reward = -0.04;
      let done = false;

      if (isTrap(x, y)) {
        reward = -1;
        done = true;
      } else if (isGoal(x, y)) {
        reward = 1;
        done = true;
      }

      return { nextState: { x, y }, reward, done };
    }

    function maxQ(state) {
      const values = Object.values(Q[stateKey(state.x, state.y)]);
      return Math.max(...values);
    }

    function bestAction(state) {
      const qs = Q[stateKey(state.x, state.y)];
      let best = ACTIONS[0];
      for (const a of ACTIONS) {
        if (qs[a] > qs[best]) best = a;
      }
      return best;
    }

    function chooseAction(state) {
      if (Math.random() < epsilon) {
        return ACTIONS[Math.floor(Math.random() * ACTIONS.length)];
      }
      return bestAction(state);
    }

    function setControlsDisabled(disabled) {
      train100Btn.disabled = disabled;
      train1000Btn.disabled = disabled;
      stepMoveBtn.disabled = disabled;
      runGreedyBtn.disabled = disabled;
      resetBtn.disabled = disabled;
      stopBtn.disabled = !disabled;
    }

    function applyQUpdate(state, action, nextState, reward, done) {
      const sKey = stateKey(state.x, state.y);
      const oldQ = Q[sKey][action];
      const nextBest = done ? 0 : maxQ(nextState);
      const target = reward + gamma * nextBest;
      const tdError = target - oldQ;
      const newQ = oldQ + alpha * tdError;
      Q[sKey][action] = newQ;

      return {
        state: { ...state },
        action,
        reward,
        nextState: { ...nextState },
        done,
        oldQ,
        nextBest,
        target,
        tdError,
        newQ,
        alpha,
        gamma
      };
    }

    async function trainEpisode(maxSteps = 100, visualize = false) {
      let state = resetEnv();
      let totalReward = 0;
      let steps = 0;

      for (let i = 0; i < maxSteps; i++) {
        const action = chooseAction(state);
        const { nextState, reward, done } = step(state, action);
        const update = applyQUpdate(state, action, nextState, reward, done);

        totalReward += reward;
        state = nextState;
        steps = i + 1;
        updateLastUpdatePanel(update);

        if (visualize) {
          draw(state);
          statusEl.textContent = `Training episode ${episode + 1}: step ${steps}/${maxSteps}`;
          await sleep(Number(visualSpeedEl.value));
        }

        if (done || cancelRequested) break;
      }

      episode++;
      rewardsHistory.push(totalReward);
      if (rewardsHistory.length > 100) rewardsHistory.shift();

      epsilon = Math.max(minEpsilon, epsilon * epsilonDecay);
      return { totalReward, steps };
    }

    async function stepTrainingMove() {
      if (busy) return;

      if (!stepSession.active) {
        stepSession = { active: true, state: resetEnv(), totalReward: 0, steps: 0 };
        statusEl.textContent = `Step mode: episode ${episode + 1} started.`;
      }

      const action = chooseAction(stepSession.state);
      const { nextState, reward, done } = step(stepSession.state, action);
      const update = applyQUpdate(stepSession.state, action, nextState, reward, done);
      updateLastUpdatePanel(update);

      stepSession.state = nextState;
      stepSession.totalReward += reward;
      stepSession.steps += 1;

      draw(stepSession.state);
      statusEl.textContent = `Step mode: action ${stepSession.steps}, reward ${reward.toFixed(2)}.`;

      if (done || stepSession.steps >= 100) {
        episode++;
        rewardsHistory.push(stepSession.totalReward);
        if (rewardsHistory.length > 100) rewardsHistory.shift();
        epsilon = Math.max(minEpsilon, epsilon * epsilonDecay);

        const ending = done ? "terminal state reached" : "max steps reached";
        statusEl.textContent = `Step episode completed (${ending}). Total reward: ${stepSession.totalReward.toFixed(3)}.`;
        stepSession = { active: false, state: null, totalReward: 0, steps: 0 };
        draw();
      }
    }

    async function trainEpisodes(count) {
      if (busy) return;
      busy = true;
      setControlsDisabled(true);

      stepSession = { active: false, state: null, totalReward: 0, steps: 0 };
      const visualize = showLearningEl.checked;
      cancelRequested = false;

      try {
        for (let i = 0; i < count; i++) {
          if (cancelRequested) break;
          await trainEpisode(100, visualize);
          if (visualize) {
            draw();
            await sleep(Math.max(60, Number(visualSpeedEl.value) - 120));
          }
        }

        statusEl.textContent = cancelRequested
          ? "Training stopped by user."
          : `Completed training for ${count} episodes.`;
      } finally {
        draw();
        setControlsDisabled(false);
        busy = false;
      }
    }

    function average(arr) {
      if (!arr.length) return 0;
      return arr.reduce((a, b) => a + b, 0) / arr.length;
    }

    function drawArrow(x, y, action) {
      const cx = x * CELL + CELL / 2;
      const cy = y * CELL + CELL / 2;
      const len = CELL * 0.2;

      ctx.beginPath();
      if (action === "up") {
        ctx.moveTo(cx, cy - len);
        ctx.lineTo(cx, cy + len);
      } else if (action === "down") {
        ctx.moveTo(cx, cy + len);
        ctx.lineTo(cx, cy - len);
      } else if (action === "left") {
        ctx.moveTo(cx - len, cy);
        ctx.lineTo(cx + len, cy);
      } else if (action === "right") {
        ctx.moveTo(cx + len, cy);
        ctx.lineTo(cx - len, cy);
      }
      ctx.stroke();
    }

    function draw(agent = null) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (let y = 0; y < GRID_SIZE; y++) {
        for (let x = 0; x < GRID_SIZE; x++) {
          const px = x * CELL;
          const py = y * CELL;

          ctx.strokeRect(px, py, CELL, CELL);

          if (x === START.x && y === START.y) {
            ctx.fillStyle = "#d0e8ff";
            ctx.fillRect(px, py, CELL, CELL);
          }

          if (isGoal(x, y)) {
            ctx.fillStyle = "#b6f5b6";
            ctx.fillRect(px, py, CELL, CELL);
          }

          if (isTrap(x, y)) {
            ctx.fillStyle = "#f5b6b6";
            ctx.fillRect(px, py, CELL, CELL);
          }

          ctx.strokeStyle = "#333";
          drawArrow(x, y, bestAction({ x, y }));
        }
      }

      if (agent) {
        ctx.fillStyle = "#111";
        ctx.beginPath();
        ctx.arc(agent.x * CELL + CELL / 2, agent.y * CELL + CELL / 2, CELL * 0.2, 0, Math.PI * 2);
        ctx.fill();
      }

      statsEl.textContent =
        `Episode: ${episode} | Epsilon: ${epsilon.toFixed(3)} | Avg reward (last ${rewardsHistory.length}): ${average(rewardsHistory).toFixed(3)}`;
    }

    async function runLearnedPolicy() {
      if (busy) return;
      busy = true;
      setControlsDisabled(true);
      stepSession = { active: false, state: null, totalReward: 0, steps: 0 };
      cancelRequested = false;
      statusEl.textContent = "Running greedy policy.";

      let state = resetEnv();
      draw(state);

      try {
        for (let i = 0; i < 30; i++) {
          if (cancelRequested) break;
          await sleep(320);
          const action = bestAction(state);
          const { nextState, done } = step(state, action);
          state = nextState;
          draw(state);
          if (done) break;
        }

        statusEl.textContent = cancelRequested ? "Greedy run stopped by user." : "Greedy run completed.";
      } finally {
        setControlsDisabled(false);
        busy = false;
      }
    }

    train100Btn.onclick = () => trainEpisodes(100);
    train1000Btn.onclick = () => trainEpisodes(1000);
    stepMoveBtn.onclick = stepTrainingMove;
    runGreedyBtn.onclick = runLearnedPolicy;

    stopBtn.onclick = () => {
      if (!busy) return;
      cancelRequested = true;
      statusEl.textContent = "Stopping…";
    };

    resetBtn.onclick = () => {
      if (busy) return;
      Q = createQTable();
      epsilon = 0.3;
      episode = 0;
      rewardsHistory = [];
      stepSession = { active: false, state: null, totalReward: 0, steps: 0 };
      cancelRequested = false;
      statusEl.textContent = "Reset complete.";
      updateLastUpdatePanel(null);
      draw();
    };

    async function toggleChangelog() {
      if (changelogPanelEl.style.display === "block") {
        changelogPanelEl.style.display = "none";
        return;
      }

      if (!changelogPanelEl.dataset.loaded) {
        changelogPanelEl.textContent = "Loading changelog…";
        try {
          const response = await fetch("./VERSION_HISTORY.md", { cache: "no-store" });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const markdownText = await response.text();
          changelogPanelEl.textContent = markdownText;
          changelogPanelEl.dataset.loaded = "true";
        } catch (error) {
          changelogPanelEl.textContent = `Unable to load VERSION_HISTORY.md (${error.message}).`;
        }
      }

      changelogPanelEl.style.display = "block";
    }

    visualSpeedEl.oninput = () => {
      speedLabelEl.textContent = `${visualSpeedEl.value}ms`;
    };

    versionLinkEl.textContent = APP_VERSION;
    versionLinkEl.addEventListener("click", toggleChangelog);

    renderLastUpdatePanel(document.getElementById("explanation"));
    renderLearningSummary(document.getElementById("explanation"));
    renderTrainingFlowFAQ(document.getElementById("explanation"));
    renderMathWalkthrough(document.getElementById("explanation"));
    updateLastUpdatePanel(null);
    draw();
  </script>
</body>
</html>
